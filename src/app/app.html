@if (isLoading()) {
  <div class="flex items-center justify-center h-screen">
    <div
      class="bg-white border-2 border-black rounded-2xl p-8 shadow-[5px_5px_0px_#000] flex flex-col items-center gap-4"
    >
      <p class="text-sm font-medium text-gray-700">loading posts...</p>
      <div
        class="w-8 h-8 border-4 border-purple-200 border-t-transparent rounded-full animate-spin"
      ></div>
    </div>
  </div>
} @else {
  <div class="justify-center">
    <!-- <app-post [post]="posts()[0]"></app-post> -->
    <router-outlet></router-outlet>
  </div>
}
