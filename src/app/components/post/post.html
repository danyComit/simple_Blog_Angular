<div class="bg-white border-2 border-black rounded-2xl p-5 shadow-[5px_5px_0px_#000] relative">
  <span
    class="inline-block text-xs font-medium px-3 py-1 rounded-full border-2 border-black"
    [class]="badgeClass()"
  >
    post #{{ post().id.toString().padStart(3, '0') }}
  </span>
  <h2 class="text-lg font-medium text-gray-900 mt-3 mb-2 truncate overflow-hidden">
    {{ post().title }}
  </h2>
  <p class="text-sm text-gray-500 leading-relaxed break-all">{{ post().content }}</p>
  <div class="flex items-center justify-between mt-4 pt-3 border-t-2 border-dashed border-gray-200">
    <span class="text-xs text-gray-400">
      <i class="ti ti-calendar" aria-hidden="true"></i>
      {{ post().date }} · {{ wordCount() }} words
    </span>
  </div>
</div>
