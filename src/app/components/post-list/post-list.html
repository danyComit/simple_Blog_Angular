<div class="max-w-2xl mx-auto p-6">
  <h2 class="text-2xl font-medium text-gray-900 mb-6 flex items-center gap-2">
    <span
      class="inline-flex items-center justify-center w-8 h-8 bg-amber-300 border-2 border-black rounded-lg"
    >
      <i class="ti ti-pencil text-base text-black" aria-hidden="true"></i>
    </span>
    my blog posts!
  </h2>

  @for (post of posts(); track post.id) {
    <div class="mb-6">
      <a [routerLink]="['/posts', post.id]" class="block">
        <app-post [post]="post"></app-post>
      </a>
      <button
        (click)="deleteFromPostList(post.id)"
        class="mt-3 text-xs font-medium text-white bg-red-400 border-2 border-black px-4 py-1.5 rounded-full shadow-[3px_3px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[1px_1px_0px_#000] transition-all"
      >
        <i class="ti ti-trash" aria-hidden="true"></i>
        delete!
      </button>

      <a [routerLink]="['/posts/edit', post.id]"> edit!</a>
    </div>
  }

  <a
    routerLink="/add"
    class="inline-block mt-3 text-xs font-medium text-white bg-green-400 border-2 border-black px-4 py-1.5 rounded-full shadow-[3px_3px_0px_#000] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[1px_1px_0px_#000] transition-all"
  >
    Add Post!
  </a>
</div>
